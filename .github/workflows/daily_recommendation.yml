name: Daily Tokyo Restaurant Recommendations

on:
  schedule:
    # Run every day at 08:00 JST (23:00 UTC previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Leave blank for today."
        required: false
      tabelog_only:
        description: "Use only Tabelog (no API keys required)"
        required: false
        default: "false"

jobs:
  recommend:
    name: Generate recommendations
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate recommendations
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          XHS_SEARCH_KEYWORD: ${{ vars.XHS_SEARCH_KEYWORD || '东京 中餐厅' }}
          TOKYO_LAT: ${{ vars.TOKYO_LAT || '35.6895' }}
          TOKYO_LNG: ${{ vars.TOKYO_LNG || '139.6917' }}
          TOKYO_RADIUS_METERS: ${{ vars.TOKYO_RADIUS_METERS || '30000' }}
          DAILY_TOP_N: ${{ vars.DAILY_TOP_N || '5' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.date }}" != "" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.tabelog_only }}" = "true" ] || \
             [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            ARGS="$ARGS --tabelog-only"
          fi
          python main.py $ARGS

      - name: Upload recommendations as artifact
        uses: actions/upload-artifact@v4
        with:
          name: recommendations-${{ github.run_id }}
          path: output/recommendations_*.{json,md}
          retention-days: 30

      - name: Commit and push recommendations
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add recommendations for $(date -u +%Y-%m-%d)"
          file_pattern: "output/recommendations_*.json output/recommendations_*.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
